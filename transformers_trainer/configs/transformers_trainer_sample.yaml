experiment:
  name: whisper-finetune-multiple-datasets

data:
  common_voice:
    dataset_name: "cowcheng/mozilla_foundation_common_voice_corpus_20_0"
    subsets:
      cantonese:
        name: "cantonese"
        split: "data"
        num_rows: 100000
      english:
        name: "english"
        split: "data"
        num_rows: 200000
      mandarin:
        name: "mandarin"
        split: "data"
        num_rows: 100000
    audio_column: "audio"
    transcription_column: "sentence"
    test_size: 0.05
  fleurs:
    dataset_name: "cowcheng/google_fleurs"
    subsets:
      cantonese:
        name: "cantonese"
        split: "data"
        num_rows: 1000
      english:
        name: "english"
        split: "data"
        num_rows: 2000
      mandarin:
        name: "mandarin"
        split: "data"
        num_rows: 1000
    audio_column: "audio"
    transcription_column: "raw_transcription"
    test_size: 1

trainer:
  pretrained_model_name: "openai/whisper-tiny"
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 1e-5
  num_train_epochs: 1
  lr_scheduler_type: "linear"
  warmup_steps: 100
  logging_steps: 25
  save_steps: 1000
  precision: "bf16"
  eval_steps: 1000
  gradient_checkpointing: false
